<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>MIHLab favicon</title>
  <defs>
    <style>
      @import url(https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap);
      .pinyon { font-family: "Pinyon Script", cursive; }
    </style>
    <clipPath id="earth-clip-fav">
      <circle cx="0" cy="0" r="13"/>
    </clipPath>
  </defs>

  <!-- transparent background -->

  <!-- L in Pinyon Script -->
  <text x="4" y="52" font-size="58" fill="#e8e8f0" class="pinyon">L</text>

  <!-- Moon dot -->
  <circle cx="44" cy="42" r="2.5" fill="#e8e8f0"/>

  <!-- Earth -->
  <g transform="translate(54, 28)">
    <image
      href="data:image/jpeg;base64,"
      x="-14" y="-14"
      width="28" height="28"
      preserveAspectRatio="xMidYMid slice"
      clip-path="url(#earth-clip-fav)"
    />
    <circle cx="0" cy="0" r="13" fill="none" stroke="#e8e8f0" stroke-width="0.5" opacity="0.2"/>
  </g>

</svg>
