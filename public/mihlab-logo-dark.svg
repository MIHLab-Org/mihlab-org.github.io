<svg width="680" height="215" viewBox="0 0 680 215" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>MIHLab.org logo</title>
  <rect width="680" height="215" fill="#0a0a0f"/>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Pinyon+Script&display=swap');
      .cinzel { font-family: "Cinzel", serif; }
      .pinyon { font-family: "Pinyon Script", cursive; }
    </style>
    <clipPath id="earth-clip">
      <circle cx="462" cy="107" r="42"/>
    </clipPath>
  </defs>

  <text x="90" y="155" font-size="82" font-weight="600" letter-spacing="2" fill="#e8e8f0" class="cinzel">MIH</text>
  <text x="196" y="178" font-size="190" font-weight="400" fill="#e8e8f0" class="pinyon">L</text>
  <path d="M 318,188 C 340,185 365,172 385,162 C 395,157 402,153 413,152 C 420,151 426,153 422,157"
    fill="none" stroke="#e8e8f0" stroke-width="1.3" stroke-linecap="round"/>
  <text x="290" y="162" font-size="90" font-weight="400" fill="#e8e8f0" class="pinyon">ab</text>
  <circle cx="407" cy="154" r="5.5" fill="#e8e8f0"/>

  <!-- Earth photo clipped to circle -->
  <image href="/mihlab-earth.jpg" x="420" y="65" width="84" height="84"
    preserveAspectRatio="xMidYMid slice" clip-path="url(#earth-clip)"/>
  <circle cx="462" cy="107" r="42" fill="none" stroke="#e8e8f0" stroke-width="0.5" opacity="0.2"/>

  <text x="516" y="155" font-size="82" font-weight="400" letter-spacing="2" fill="#e8e8f0" class="cinzel">rg</text>
</svg>